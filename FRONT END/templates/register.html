{% extends 'index.html' %}

{% block navbar %}
<ul class="navbar-nav ms-auto">
    <li class="nav-item">
        <a class="nav-link" href="{{url_for('index')}}">Home</a>
    </li>
    <li class="nav-item">
        <a class="nav-link active" href="{{url_for('register')}}">Register</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{url_for('login')}}">Login</a>
    </li>
</ul>
{% endblock %}

{% block content %}
<div class="container py-5" style="margin-top: 80px; min-height: 80vh;">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="feature-card p-4 p-lg-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x" style="color: var(--primary-cyan);"></i>
                    <h2 class="fw-bold mt-3" style="color: white;">Create Account</h2>
                    <p class="text-muted">Join the ML WAF security platform</p>
                </div>

                <form action="{{url_for('register')}}" method="post" onsubmit="return validateForm()">
                    <div class="mb-3">
                        <label for="name" class="form-label text-light">Full Name</label>
                        <input type="text" class="form-control bg-dark text-light border-secondary" 
                               id="name" name="name" placeholder="Enter your full name"
                               required minlength="3" maxlength="30" 
                               pattern="[A-Za-z\s]+" 
                               title="User Name should be 3-30 characters long and only contain letters and spaces">
                        <div class="form-text text-muted">Only letters and spaces, 3-30 characters.</div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-light">Email address</label>
                        <input type="email" class="form-control bg-dark text-light border-secondary" 
                               id="email" name="email" placeholder="name@example.com" required>
                        <div class="form-text text-muted">We'll never share your email.</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-light">Password</label>
                        <input type="password" class="form-control bg-dark text-light border-secondary" 
                               id="password" name="password" placeholder="Min. 8 characters" 
                               required minlength="8" 
                               title="Password must be at least 8 characters long">
                    </div>

                    <div class="mb-4">
                        <label for="c_password" class="form-label text-light">Confirm Password</label>
                        <input type="password" class="form-control bg-dark text-light border-secondary" 
                               id="c_password" name="c_password" placeholder="Re-enter password" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-glow-alt py-2">
                            <i class="fas fa-check-circle me-2"></i>Register
                        </button>
                    </div>

                    <p class="text-center text-muted mt-4 mb-0">
                        Already have an account? 
                        <a href="{{url_for('login')}}" class="text-decoration-none" style="color: var(--primary-cyan);">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Enhanced Validation Script -->
<script>
function validateForm() {
    var name = document.getElementById('name').value.trim();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var c_password = document.getElementById('c_password').value;

    // Name validation
    if (name.length < 3) {
        alert("User Name must be at least 3 characters long.");
        return false;
    }
    var nameRegex = /^[A-Za-z\s]+$/;
    if (!nameRegex.test(name)) {
        alert("User Name can only contain letters and spaces.");
        return false;
    }

    // Email validation (basic)
    var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        alert("Please enter a valid email address.");
        return false;
    }

    // Password match
    if (password !== c_password) {
        alert("Passwords do not match.");
        return false;
    }

    return true;
}
</script>
{% endblock %}
